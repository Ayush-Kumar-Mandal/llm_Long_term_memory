memory:
  top_k: 5
  max_injection_tokens: 500
  confidence_threshold: 0.7
  decay_factor: 0.95

embedding:
  model: "all-MiniLM-L6-v2"
  dimension: 384

llm:
  model: "claude-sonnet-4-20250514"
  max_tokens: 1000
  temperature: 0.2

storage:
  vector_db: "chroma"   # chroma | pinecone | faiss
  structured_db: "sqlite"  # sqlite | postgres
